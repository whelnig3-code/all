<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>YATAI Menu V2 - A3 Landscape 2P - Izakaya</title>
  <style>
    @page { size: 426mm 303mm; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 426mm;
      font-family: 'Noto Sans KR', sans-serif;
      background: #fff; color: #1a1a1a;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .page {
      width: 426mm; height: 303mm;
      padding: 5mm 10mm 4mm;
      page-break-after: always; overflow: hidden; background: #fff;
    }
    .page:last-child { page-break-after: auto; }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 2mm 0; margin-bottom: 1.5mm; border-bottom: 3px solid #8B1E1E;
    }
    .header-left { font-family:'Montserrat',sans-serif; font-size: 30pt; font-weight: 900; letter-spacing: 8px; color: #8B1E1E; }
    .header-right { text-align: right; }
    .header-jp { font-size: 12pt; color: #8B1E1E; font-weight: 700; letter-spacing: 2px; }
    .header-hours { font-family:'Montserrat',sans-serif; font-size: 6pt; color: #aaa; margin-top: 0.5mm; }

    .popular-stripe {
      display: flex; align-items: center; justify-content: center;
      gap: 4mm; padding: 1mm 0; margin-bottom: 1.5mm;
      background: #8B1E1E; color: #fff; border-radius: 0.5mm;
    }
    .popular-stripe .label { font-family:'Montserrat',sans-serif; font-size: 6.5pt; font-weight: 800; }
    .popular-stripe .item { font-size: 7pt; font-weight: 600; }
    .popular-stripe .sep { opacity: 0.5; font-size: 5pt; }

    .page2-header {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 1.5mm 0; margin-bottom: 1.5mm; border-bottom: 3px solid #8B1E1E;
    }
    .page2-brand { font-family:'Montserrat',sans-serif; font-size: 16pt; font-weight: 800; letter-spacing: 6px; color: #8B1E1E; }
    .page2-sub { font-family:'Montserrat',sans-serif; font-size: 7pt; color: #aaa; letter-spacing: 2px; }

    .cols-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5mm; }

    .cat { break-inside: avoid; margin-bottom: 2mm; }
    .cat-bar { background: #8B1E1E; color: #fff; padding: 0.8mm 2.5mm; margin-bottom: 0.8mm; display: flex; align-items: baseline; gap: 1.5mm; }
    .cat-bar-ko { font-size: 9pt; font-weight: 700; }
    .cat-bar-en { font-family:'Montserrat',sans-serif; font-size: 5.5pt; opacity: 0.75; }
    .cat-note { font-size: 5pt; color: #C96A2B; font-style: italic; padding: 0.2mm 0 0.5mm 1mm; }

    .row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.4mm 1mm; line-height: 1.3; }
    .name { font-size: 8.5pt; font-weight: 500; flex-shrink: 0; }
    .name-en { font-family:'Montserrat',sans-serif; font-size: 5pt; color: #999; margin-left: 1mm; }
    .star { color: #C96A2B; font-size: 7.5pt; margin-right: 0.3mm; font-weight: 700; }
    .dots { flex: 1; border-bottom: 1px dotted #ccc; margin: 0 1.5mm; min-width: 3mm; }
    .price { font-family:'Montserrat',sans-serif; font-size: 8.5pt; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .desc { font-size: 5pt; color: #888; padding-left: 1.5mm; line-height: 1.2; }

    .cat + .cat { border-top: 0.5px solid #eee; padding-top: 0.8mm; }

    .full-span { grid-column: 1 / -1; }
    .origin { margin-top: 1.5mm; padding-top: 1.5mm; border-top: 1.5px solid #8B1E1E; }
    .origin-title { font-size: 6pt; font-weight: 700; color: #8B1E1E; margin-bottom: 0.3mm; }
    .origin-text { font-size: 5pt; color: #999; line-height: 1.4; }

    .review { text-align: center; margin-top: 1mm; padding: 1.5mm 0; border-top: 2.5px solid #8B1E1E; }
    .review-title { font-size: 8pt; font-weight: 800; color: #8B1E1E; }
    .review-body { font-size: 7pt; }
    .review-en { font-size: 5.5pt; color: #aaa; margin-top: 0.3mm; }
    .review-limit { font-size: 4.5pt; color: #ccc; margin-top: 0.3mm; }

    .qr-bar { display: flex; justify-content: center; gap: 14mm; padding-top: 2mm; margin-top: 1mm; border-top: 1px solid #eee; }
    .qr-block { text-align: center; }
    .qr-img { width: 16mm; height: 16mm; }
    .qr-label { font-family:'Montserrat',sans-serif; font-size: 6.5pt; font-weight: 700; color: #8B1E1E; margin-bottom: 0.5mm; }
    .qr-desc { font-size: 5pt; color: #999; margin-top: 0.5mm; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
  (function(){
    var CAT_NOTES={'sashimi-set':'\u25B8 \uC2A4\uB044\uB2E4\uC2DC 12\uC885 \uC81C\uACF5 \u2014 12 side dishes'};
    var POPULAR=['sushi-assorted','fried-tori-karaage','roll-dragon','set-b'];
    var ORIGINS=['\uAD11\uC5B4\u2014\uAD6D\uB0B4\uC0B0','\uC6B0\uB7ED\u2014\uAD6D\uB0B4\uC0B0','\uC5F0\uC5B4\u2014\uB178\uB974\uC6E8\uC774\uC0B0','\uCC38\uCE58\u2014\uC6D0\uC591\uC0B0','\uC6B0\uC0BC\uACA8\u2014\uBBF8\uAD6D\uC0B0','\uB2ED\uACE0\uAE30\u2014\uBE0C\uB77C\uC9C8\uC0B0','\uBC14\uB2E4\uC7A5\uC5B4\u2014\uD398\uB8E8\uC0B0','\uCABD\uAFB8\uBBF8\u2014\uBCA0\uD2B8\uB0A8\uC0B0','\uC54C\uD0D5 \uC7AC\uB8CC\u2014\uB7EC\uC2DC\uC544\uC0B0'];

    fetch('data/menu.json').then(function(r){return r.json()}).then(render);

    function render(data){
      var cm={},bc={},im={};
      data.categories.forEach(function(c){cm[c.id]=c});
      data.items.forEach(function(i){im[i.id]=i;if(!i.active)return;if(!bc[i.category])bc[i.category]=[];bc[i.category].push(i)});
      Object.keys(bc).forEach(function(k){bc[k].sort(function(a,b){return a.sort-b.sort})});

      var h='';
      // PAGE 1
      h+='<div class="page">';
      h+='<div class="header"><div class="header-left">YATAI</div><div class="header-right"><div class="header-jp">\u65E5\u672C\u6599\u7406</div><div class="header-hours">OPEN 11:00 \u2013 23:00 \u00B7 LAST ORDER 22:00</div></div></div>';
      var pp=[];POPULAR.forEach(function(id){var it=im[id];if(it)pp.push('<span class="item">\u2605 '+esc(it.name.ko)+'</span>')});
      h+='<div class="popular-stripe"><span class="label">\u2605 BEST</span>'+pp.join('<span class="sep">\u00B7</span>')+'</div>';
      h+='<div class="cols-3">';
      h+='<div>';h+=catHTML(cm['set'],bc['set']);h+=catHTML(cm['sashimi'],bc['sashimi']);h+=catHTML(cm['sashimi-set'],bc['sashimi-set'],CAT_NOTES['sashimi-set']);h+='</div>';
      h+='<div>';h+=catHTML(cm['sushi'],bc['sushi']);h+=catHTML(cm['sushi-single'],bc['sushi-single']);h+='</div>';
      h+='<div>';h+=catHTML(cm['roll'],bc['roll']);h+='</div>';
      h+='</div></div>';

      // PAGE 2
      h+='<div class="page">';
      h+='<div class="page2-header"><div class="page2-brand">YATAI</div><div class="page2-sub">JAPANESE RESTAURANT \u00B7 MENU</div></div>';
      h+='<div class="cols-3">';
      h+='<div>';h+=catHTML(cm['signature'],bc['signature']);h+=catHTML(cm['grill'],bc['grill']);h+=catHTML(cm['fried'],bc['fried']);h+='</div>';
      h+='<div>';h+=catHTML(cm['meal'],bc['meal']);h+=catHTML(cm['noodle'],bc['noodle']);h+='</div>';
      h+='<div>';h+=catHTML(cm['hotpot'],bc['hotpot']);h+=catHTML(cm['drink'],bc['drink']);h+=catHTML(cm['extras'],bc['extras']);h+='</div>';
      h+='<div class="full-span origin"><div class="origin-title">\uC6D0\uC0B0\uC9C0 \uD45C\uC2DC</div><div class="origin-text">'+ORIGINS.join(' | ')+'</div></div>';
      h+='<div class="full-span review"><div class="review-title">\uB9AC\uBDF0 \uC774\uBCA4\uD2B8</div><div class="review-body">\uB124\uC774\uBC84 \uB9AC\uBDF0 \u2605\u2605\u2605\u2605\u2605 \uC791\uC131 \uC2DC \uC74C\uB8CC 1\uBCD1 \uBB34\uB8CC</div><div class="review-en">Leave a \u2605\u2605\u2605\u2605\u2605 review \u2014 Get 1 free drink</div><div class="review-limit">\u203B 1 \uD14C\uC774\uBE14\uB2F9 1\uD68C | Limit: 1 per table</div></div>';
      h+='<div class="full-span qr-bar"><div class="qr-block"><div class="qr-label">\uD83D\uDCF7 Menu Photos</div><img class="qr-img" src="qr/gallery.png"><div class="qr-desc">Scan to view food photos</div></div><div class="qr-block"><div class="qr-label">\uD83C\uDF10 Mobile Menu</div><img class="qr-img" src="qr/mobile-menu.png"><div class="qr-desc">Scan for multi-language menu</div></div></div>';
      h+='</div></div>';

      document.getElementById('app').innerHTML=h;
    }

    function catHTML(cat,items,note){
      if(!cat||!items||!items.length)return'';
      var h='<div class="cat"><div class="cat-bar"><span class="cat-bar-ko">'+esc(cat.name.ko)+'</span><span class="cat-bar-en">'+esc(cat.name.en)+'</span></div>';
      if(note)h+='<div class="cat-note">'+note+'</div>';
      items.forEach(function(it){
        h+='<div class="row"><span class="name">';
        if(it.recommended)h+='<span class="star">\u2605</span>';
        h+=esc(it.name.ko);if(it.name.en)h+='<span class="name-en">'+esc(it.name.en)+'</span>';
        h+='</span><span class="dots"></span><span class="price">\u20A9'+it.price.toLocaleString('ko-KR')+'</span></div>';
        if(it.description&&it.description.ko)h+='<div class="desc">'+esc(it.description.ko)+'</div>';
      });
      return h+'</div>';
    }
    function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
  })();
  </script>
</body>
</html>
