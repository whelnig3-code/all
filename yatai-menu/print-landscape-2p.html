<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>YATAI Menu - A3 Landscape 2P - Izakaya</title>
  <style>
    @page { size: 426mm 303mm; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 426mm;
      font-family: 'Segoe UI', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
      background: #FAF7F2; color: #1a1a1a;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .page {
      width: 426mm; height: 303mm;
      padding: 9mm 12mm 8mm;
      page-break-after: always; overflow: hidden;
      background: #FAF7F2;
    }
    .page:last-child { page-break-after: auto; }

    .header { text-align: center; padding: 3mm 0; margin-bottom: 2mm; border-bottom: 2.5px solid #C45C26; }
    .header-brand { font-size: 36pt; font-weight: 900; letter-spacing: 10px; color: #C45C26; }
    .header-sub { font-size: 9pt; color: #888; letter-spacing: 3px; margin-top: 0.5mm; }
    .header-hours { font-size: 7pt; color: #aaa; margin-top: 1mm; }

    .popular { text-align: center; padding: 2mm 0; margin-bottom: 2mm; background: #C45C26; color: #fff; border-radius: 1mm; }
    .popular-title { font-size: 8pt; font-weight: 700; margin-bottom: 0.5mm; }
    .popular-items { font-size: 7.5pt; opacity: 0.95; }
    .popular-items span { margin: 0 2.5mm; }

    .page2-header { text-align: center; padding: 2.5mm 0; margin-bottom: 2mm; border-bottom: 2.5px solid #C45C26; }
    .page2-brand { font-size: 16pt; font-weight: 800; letter-spacing: 6px; color: #C45C26; }
    .page2-sub { font-size: 7pt; color: #aaa; letter-spacing: 2px; margin-top: 0.5mm; }

    .cols-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5mm; }
    .layout-front { display: grid; grid-template-columns: 1fr 70mm 1fr; gap: 4mm; }

    .brand-col { display: flex; flex-direction: column; align-items: center; padding: 0 2mm; }
    .brand-vertical { writing-mode: vertical-rl; font-size: 40pt; font-weight: 900; color: #C45C26; letter-spacing: 6px; margin: 4mm 0; text-orientation: mixed; }
    .brand-jp { writing-mode: vertical-rl; font-size: 12pt; color: #C45C26; letter-spacing: 3px; margin-bottom: 3mm; }
    .brand-divider { width: 60%; height: 1.5px; background: #C45C26; margin: 2mm 0; }

    .cat { break-inside: avoid; margin-bottom: 2.5mm; }
    .cat-bar { background: #C45C26; color: #fff; padding: 0.8mm 2.5mm; margin-bottom: 1mm; border-radius: 0.8mm; display: flex; align-items: baseline; gap: 1.5mm; }
    .cat-bar-ko { font-size: 9pt; font-weight: 700; }
    .cat-bar-en { font-size: 5.5pt; opacity: 0.8; }
    .cat-note { font-size: 5pt; color: #C45C26; font-style: italic; padding: 0.2mm 0 0.5mm 1mm; }

    .row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.5mm 1mm; line-height: 1.3; }
    .name { font-size: 8.5pt; font-weight: 500; flex-shrink: 0; }
    .name-en { font-size: 5pt; color: #999; margin-left: 1mm; }
    .star { color: #D4A017; font-size: 7.5pt; margin-right: 0.3mm; }
    .dots { flex: 1; border-bottom: 1px dotted #ccc; margin: 0 1.5mm; min-width: 3mm; }
    .price { font-size: 8.5pt; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .desc { font-size: 5pt; color: #999; padding-left: 1.5mm; line-height: 1.2; }

    .full-span { grid-column: 1 / -1; }
    .origin { margin-top: 2mm; padding-top: 2mm; border-top: 1px solid #ddd; }
    .origin-title { font-size: 6.5pt; font-weight: 700; color: #C45C26; margin-bottom: 0.5mm; }
    .origin-text { font-size: 5pt; color: #999; line-height: 1.4; }

    .review { text-align: center; margin-top: 2mm; padding: 2mm 0; border-top: 2px solid #C45C26; }
    .review-title { font-size: 9pt; font-weight: 800; color: #C45C26; margin-bottom: 0.5mm; }
    .review-body { font-size: 7.5pt; }
    .review-en { font-size: 6pt; color: #aaa; margin-top: 0.3mm; }
    .review-limit { font-size: 5pt; color: #ccc; margin-top: 0.3mm; }

    .qr-bar { display: flex; justify-content: center; gap: 14mm; padding-top: 3mm; margin-top: 1.5mm; border-top: 1px solid #ddd; }
    .qr-block { text-align: center; }
    .qr-img { width: 18mm; height: 18mm; }
    .qr-label { font-size: 7.5pt; font-weight: 700; color: #C45C26; margin-bottom: 0.5mm; }
    .qr-desc { font-size: 5.5pt; color: #999; margin-top: 0.5mm; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
  (function(){
    var CAT_NOTES={'sashimi-set':'▸ 스끼다시 12종 제공 — Fresh sashimi served with 12 side dishes.'};
    var POPULAR=['sushi-assorted','fried-tori-karaage','roll-dragon'];
    var ORIGINS=['광어—국내산','우럭—국내산','연어—노르웨이산','참치—원양산','우삼겹—미국산','닭고기—브라질산','바다장어—페루산','쭈꾸미—베트남산','알탕 재료—러시아산'];

    fetch('data/menu.json').then(function(r){return r.json()}).then(render);

    function render(d){
      var cm={},bc={},im={};
      d.categories.forEach(function(c){cm[c.id]=c});
      d.items.forEach(function(i){im[i.id]=i;if(!i.active)return;if(!bc[i.category])bc[i.category]=[];bc[i.category].push(i)});
      Object.keys(bc).forEach(function(k){bc[k].sort(function(a,b){return a.sort-b.sort})});

      var h='';

      // PAGE 1
      h+='<div class="page">';
      h+='<div class="header"><div class="header-brand">YATAI</div><div class="header-sub">JAPANESE RESTAURANT</div><div class="header-hours">OPEN 11:00 – 23:00 · LAST ORDER 22:00</div></div>';
      var pp=[];POPULAR.forEach(function(id){var it=im[id];if(it)pp.push('<span>★ '+esc(it.name.ko)+'</span>')});
      h+='<div class="popular"><div class="popular-title">★ Popular Menu</div><div class="popular-items">'+pp.join('<span> · </span>')+'</div></div>';

      h+='<div class="layout-front">';
      h+='<div>';
      h+=catHTML(cm['set'],bc['set']);
      h+=catHTML(cm['sashimi'],bc['sashimi']);
      h+=catHTML(cm['sashimi-set'],bc['sashimi-set'],CAT_NOTES['sashimi-set']);
      h+='</div>';

      h+='<div class="brand-col">';
      h+='<div class="brand-divider"></div>';
      h+='<div style="display:flex;gap:3mm;align-items:center;margin:3mm 0">';
      h+='<div class="brand-vertical">YATAI</div>';
      h+='<div class="brand-jp">日本料理</div>';
      h+='</div>';
      h+='<div class="brand-divider"></div>';
      h+='<div style="margin-top:4mm">';
      h+=catHTML(cm['sushi-single'],bc['sushi-single']);
      h+='</div></div>';

      h+='<div>';
      h+=catHTML(cm['sushi'],bc['sushi']);
      h+=catHTML(cm['roll'],bc['roll']);
      h+='</div>';
      h+='</div></div>';

      // PAGE 2
      h+='<div class="page">';
      h+='<div class="page2-header"><div class="page2-brand">YATAI</div><div class="page2-sub">JAPANESE RESTAURANT · MENU</div></div>';
      h+='<div class="cols-3">';
      h+='<div>';h+=catHTML(cm['signature'],bc['signature']);h+=catHTML(cm['grill'],bc['grill']);h+=catHTML(cm['fried'],bc['fried']);h+='</div>';
      h+='<div>';h+=catHTML(cm['meal'],bc['meal']);h+=catHTML(cm['noodle'],bc['noodle']);h+='</div>';
      h+='<div>';h+=catHTML(cm['hotpot'],bc['hotpot']);h+=catHTML(cm['drink'],bc['drink']);h+=catHTML(cm['extras'],bc['extras']);h+='</div>';
      h+='<div class="full-span origin"><div class="origin-title">원산지 표시</div><div class="origin-text">'+ORIGINS.join(' | ')+'</div></div>';
      h+='<div class="full-span review"><div class="review-title">리뷰 이벤트</div><div class="review-body">네이버 리뷰 ★★★★★ 작성 시 음료 1병 무료</div><div class="review-en">Leave a ★★★★★ review — Get 1 free drink</div><div class="review-limit">※ 1 테이블당 1회 | Limit: 1 per table</div></div>';
      h+='<div class="full-span qr-bar"><div class="qr-block"><div class="qr-label">📷 Menu Photos</div><img class="qr-img" src="qr/gallery.png"><div class="qr-desc">Scan to view food photos</div></div><div class="qr-block"><div class="qr-label">🌐 Mobile Menu</div><img class="qr-img" src="qr/mobile-menu.png"><div class="qr-desc">Scan for multi-language menu</div></div></div>';
      h+='</div></div>';

      document.getElementById('app').innerHTML=h;
    }

    function catHTML(cat,items,note){
      if(!cat||!items||!items.length)return'';
      var h='<div class="cat"><div class="cat-bar"><span class="cat-bar-ko">'+esc(cat.name.ko)+'</span><span class="cat-bar-en">'+esc(cat.name.en)+'</span></div>';
      if(note)h+='<div class="cat-note">'+note+'</div>';
      items.forEach(function(it){
        h+='<div class="row"><span class="name">';
        if(it.recommended)h+='<span class="star">★</span>';
        h+=esc(it.name.ko);if(it.name.en)h+='<span class="name-en">'+esc(it.name.en)+'</span>';
        h+='</span><span class="dots"></span><span class="price">₩'+it.price.toLocaleString('ko-KR')+'</span></div>';
        if(it.description&&it.description.ko)h+='<div class="desc">'+esc(it.description.ko)+'</div>';
      });
      return h+'</div>';
    }
    function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
  })();
  </script>
</body>
</html>
