<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>YATAI Menu V1 - A3 Landscape 1P - Improved</title>
  <style>
    @page { size: 426mm 303mm; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 426mm; min-height: 303mm;
      font-family: 'Noto Sans KR', sans-serif;
      background: #fff; color: #1a1a1a;
      padding: 4mm 8mm 4mm;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .header { text-align: center; padding: 1.5mm 0; margin-bottom: 1mm; border-bottom: 2px solid #8B1E1E; }
    .header-brand { font-family:'Montserrat',sans-serif; font-size: 24pt; font-weight: 900; letter-spacing: 8px; color: #8B1E1E; }
    .header-sub { font-family:'Montserrat',sans-serif; font-size: 6pt; color: #999; letter-spacing: 3px; margin-top: 0.3mm; }
    .header-hours { font-family:'Montserrat',sans-serif; font-size: 5.5pt; color: #aaa; margin-top: 0.3mm; }

    .popular-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 5mm; padding: 1mm 2mm; margin-bottom: 1mm;
      background: #8B1E1E; border-radius: 1mm; color: #fff;
    }
    .popular-photo { width: 22mm; height: 15mm; object-fit: cover; border-radius: 1mm; border: 1px solid rgba(255,255,255,0.3); }
    .popular-photo-block { text-align: center; }
    .popular-name { font-size: 5.5pt; font-weight: 700; color: #FFD700; margin-top: 0.3mm; }
    .popular-price { font-size: 5pt; opacity: 0.85; }
    .popular-label { font-family:'Montserrat',sans-serif; font-size: 6pt; font-weight: 800; }

    .cols { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 3mm; }

    .cat { break-inside: avoid; margin-bottom: 1.2mm; }
    .cat-bar { background: #8B1E1E; color: #fff; padding: 0.5mm 2mm; margin-bottom: 0.5mm; border-radius: 0.6mm; display: flex; align-items: baseline; gap: 1mm; }
    .cat-bar-ko { font-size: 7pt; font-weight: 700; }
    .cat-bar-en { font-family:'Montserrat',sans-serif; font-size: 4pt; opacity: 0.8; }
    .cat-note { font-size: 3.5pt; color: #8B1E1E; font-style: italic; padding: 0.1mm 0 0.2mm 1mm; }

    .row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.15mm 0.5mm; line-height: 1.15; }
    .name { font-size: 6.5pt; font-weight: 500; flex-shrink: 0; }
    .name-en { font-family:'Montserrat',sans-serif; font-size: 3.5pt; color: #999; margin-left: 0.5mm; }
    .star { color: #C96A2B; font-size: 5.5pt; margin-right: 0.2mm; font-weight: 700; }
    .dots { flex: 1; border-bottom: 1px dotted #ddd; margin: 0 0.8mm; min-width: 2mm; }
    .price { font-family:'Montserrat',sans-serif; font-size: 6.5pt; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .desc { font-size: 3.2pt; color: #999; padding-left: 0.8mm; line-height: 1.1; }

    .full-span { grid-column: 1 / -1; }
    .origin { margin-top: 0.8mm; padding-top: 0.8mm; border-top: 1px solid #eee; }
    .origin-title { font-size: 5pt; font-weight: 700; color: #8B1E1E; margin-bottom: 0.2mm; }
    .origin-text { font-size: 3.5pt; color: #999; line-height: 1.3; }

    .review { text-align: center; margin-top: 0.5mm; padding: 0.8mm 0; border-top: 2px solid #8B1E1E; }
    .review-title { font-size: 6.5pt; font-weight: 800; color: #8B1E1E; }
    .review-body { font-size: 5.5pt; }
    .review-en { font-size: 4pt; color: #aaa; }
    .review-limit { font-size: 3.5pt; color: #ccc; }

    .qr-bar { display: flex; justify-content: flex-end; gap: 6mm; padding-top: 0.8mm; }
    .qr-block { text-align: center; }
    .qr-img { width: 10mm; height: 10mm; }
    .qr-label { font-family:'Montserrat',sans-serif; font-size: 5pt; font-weight: 700; color: #8B1E1E; margin-bottom: 0.2mm; }
    .qr-desc { font-size: 3.5pt; color: #999; margin-top: 0.2mm; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-brand">YATAI</div>
    <div class="header-sub">JAPANESE RESTAURANT</div>
    <div class="header-hours">OPEN 11:00 – 23:00 · LAST ORDER 22:00</div>
  </div>
  <div id="pop"></div>
  <div class="cols" id="menu"></div>
  <script>
  (function(){
    var CAT_NOTES={'sashimi-set':'\u25B8 \uC2A4\uB044\uB2E4\uC2DC 12\uC885 \uC81C\uACF5 \u2014 12 side dishes'};
    var POPULAR_IDS=['set-b','sushi-assorted','roll-california'];
    var COL=[
      ['set','sashimi','sashimi-set','sushi'],
      ['sushi-single','roll','signature'],
      ['grill','fried','meal'],
      ['noodle','hotpot','drink','extras']
    ];
    var ORIGINS=['\uAD11\uC5B4\u2014\uAD6D\uB0B4\uC0B0','\uC6B0\uB7ED\u2014\uAD6D\uB0B4\uC0B0','\uC5F0\uC5B4\u2014\uB178\uB974\uC6E8\uC774\uC0B0','\uCC38\uCE58\u2014\uC6D0\uC591\uC0B0','\uC6B0\uC0BC\uACA8\u2014\uBBF8\uAD6D\uC0B0','\uB2ED\uACE0\uAE30\u2014\uBE0C\uB77C\uC9C8\uC0B0','\uBC14\uB2E4\uC7A5\uC5B4\u2014\uD398\uB8E8\uC0B0','\uCABD\uAFB8\uBBF8\u2014\uBCA0\uD2B8\uB0A8\uC0B0','\uC54C\uD0D5 \uC7AC\uB8CC\u2014\uB7EC\uC2DC\uC544\uC0B0'];

    fetch('data/menu.json').then(function(r){return r.json()}).then(render);

    function render(d){
      var cm={},bc={},im={};
      d.categories.forEach(function(c){cm[c.id]=c});
      d.items.forEach(function(i){im[i.id]=i;if(!i.active)return;if(!bc[i.category])bc[i.category]=[];bc[i.category].push(i)});
      Object.keys(bc).forEach(function(k){bc[k].sort(function(a,b){return a.sort-b.sort})});

      var pp='<div class="popular-bar"><div class="popular-label">\u2605 BEST</div>';
      POPULAR_IDS.forEach(function(id){var it=im[id];if(!it)return;pp+='<div class="popular-photo-block"><img class="popular-photo" src="images/'+id+'.jpg"><div class="popular-name">\u2605 '+esc(it.name.ko)+'</div><div class="popular-price">\u20A9'+it.price.toLocaleString('ko-KR')+'</div></div>'});
      pp+='</div>';
      document.getElementById('pop').innerHTML=pp;

      var h='';
      COL.forEach(function(cats){h+='<div>';cats.forEach(function(cid){h+=catHTML(cm[cid],bc[cid],CAT_NOTES[cid])});h+='</div>'});
      h+='<div class="full-span origin"><div class="origin-title">\uC6D0\uC0B0\uC9C0 \uD45C\uC2DC</div><div class="origin-text">'+ORIGINS.join(' | ')+'</div></div>';
      h+='<div class="full-span review"><div class="review-title">\uB9AC\uBDF0 \uC774\uBCA4\uD2B8</div><div class="review-body">\uB124\uC774\uBC84 \uB9AC\uBDF0 \u2605\u2605\u2605\u2605\u2605 \uC791\uC131 \uC2DC \uC74C\uB8CC 1\uBCD1 \uBB34\uB8CC</div><div class="review-en">Leave a \u2605\u2605\u2605\u2605\u2605 review \u2014 Get 1 free drink</div><div class="review-limit">\u203B 1 \uD14C\uC774\uBE14\uB2F9 1\uD68C | Limit: 1 per table</div></div>';
      h+='<div class="full-span qr-bar"><div class="qr-block"><div class="qr-label">\uD83D\uDCF7 Menu Photos</div><img class="qr-img" src="qr/gallery.png"><div class="qr-desc">Scan to view food photos</div></div><div class="qr-block"><div class="qr-label">\uD83C\uDF10 Mobile Menu</div><img class="qr-img" src="qr/mobile-menu.png"><div class="qr-desc">Scan for multi-language menu</div></div></div>';
      document.getElementById('menu').innerHTML=h;
    }

    function catHTML(cat,items,note){
      if(!cat||!items||!items.length)return'';
      var h='<div class="cat"><div class="cat-bar"><span class="cat-bar-ko">'+esc(cat.name.ko)+'</span><span class="cat-bar-en">'+esc(cat.name.en)+'</span></div>';
      if(note)h+='<div class="cat-note">'+note+'</div>';
      items.forEach(function(it){
        h+='<div class="row"><span class="name">';
        if(it.recommended)h+='<span class="star">\u2605</span>';
        h+=esc(it.name.ko);if(it.name.en)h+='<span class="name-en">'+esc(it.name.en)+'</span>';
        h+='</span><span class="dots"></span><span class="price">\u20A9'+it.price.toLocaleString('ko-KR')+'</span></div>';
        if(it.description&&it.description.ko)h+='<div class="desc">'+esc(it.description.ko)+'</div>';
      });
      return h+'</div>';
    }
    function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
  })();
  </script>
</body>
</html>
