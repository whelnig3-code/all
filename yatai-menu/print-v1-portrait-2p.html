<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>YATAI Menu - A3 Portrait 2P - Dense Izakaya</title>
  <style>
    @page { size: 303mm 426mm; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 303mm; }
    body {
      font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
      background: #FAFAFA; color: #1a1a1a;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .page {
      width: 303mm; height: 426mm;
      padding: 3mm 7mm 3mm;
      page-break-after: always; overflow: hidden;
      background: #FAFAFA;
    }
    .page:last-child { page-break-after: auto; }

    /* ===== HEADER - compact ===== */
    .header {
      text-align: center;
      padding: 1.5mm 0 1mm;
      margin-bottom: 1mm;
      border-bottom: 2.5px solid #A61C1C;
    }
    .header-brand {
      font-size: 28pt; font-weight: 900;
      letter-spacing: 10px; color: #A61C1C;
    }
    .header-sub {
      font-size: 7pt; color: #999;
      letter-spacing: 4px; margin-top: 0.3mm;
    }
    .header-hours {
      font-size: 6pt; color: #aaa; margin-top: 0.3mm;
    }

    /* ===== BEST MENU BAR (text + photo placeholders) ===== */
    .best-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 3mm; padding: 1.2mm 0;
      margin-bottom: 1.5mm;
      background: #A61C1C; color: #fff;
      border-radius: 0.8mm;
    }
    .best-label {
      font-size: 8pt; font-weight: 900;
      letter-spacing: 1px; color: #E4B200;
    }
    .best-item { font-size: 7.5pt; font-weight: 600; }
    .best-sep { opacity: 0.4; font-size: 6pt; }

    /* Photo placeholder row (hidden until images added) */
    .best-photos {
      display: flex; justify-content: center; gap: 3mm;
      margin-bottom: 1.5mm;
    }
    .best-photo-slot {
      width: 52mm; height: 32mm;
      background: #eee; border-radius: 1.5mm;
      border: 1.5px dashed #ccc;
      display: flex; align-items: center; justify-content: center;
    }
    .best-photo-slot img {
      width: 100%; height: 100%;
      object-fit: cover; border-radius: 1.5mm;
    }
    .best-photo-label {
      font-size: 6pt; color: #bbb; text-align: center;
    }
    .best-photo-name {
      font-size: 7pt; font-weight: 700; color: #A61C1C;
      text-align: center; margin-top: 0.5mm;
    }
    .best-photo-price {
      font-size: 6pt; color: #888;
      text-align: center;
    }

    /* ===== PAGE 2 HEADER ===== */
    .page2-header {
      text-align: center;
      padding: 1.2mm 0 1mm;
      margin-bottom: 1mm;
      border-bottom: 2.5px solid #A61C1C;
    }
    .page2-brand {
      font-size: 14pt; font-weight: 900;
      letter-spacing: 6px; color: #A61C1C;
    }
    .page2-sub {
      font-size: 6pt; color: #aaa;
      letter-spacing: 2px; margin-top: 0.3mm;
    }

    /* ===== GRID ===== */
    .cols-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 3.5mm;
    }

    /* ===== CATEGORY ===== */
    .cat { break-inside: avoid; margin-bottom: 1.8mm; }
    .cat-bar {
      background: #A61C1C; color: #fff;
      padding: 0.8mm 2.5mm;
      margin-bottom: 0.8mm;
      display: flex; align-items: baseline; gap: 1.5mm;
    }
    .cat-bar-ko {
      font-size: 9.5pt; font-weight: 700;
      letter-spacing: 0.3px;
    }
    .cat-bar-en {
      font-size: 5.5pt; opacity: 0.75;
    }
    .cat-note {
      font-size: 5pt; color: #A61C1C;
      font-style: italic;
      padding: 0.1mm 0 0.3mm 1mm;
    }

    /* ===== ITEM ROW ===== */
    .row {
      display: flex; justify-content: space-between;
      align-items: baseline;
      padding: 0.3mm 0.8mm;
      line-height: 1.25;
    }
    .name {
      font-size: 8.5pt; font-weight: 500;
      flex-shrink: 0;
    }
    .name-en {
      font-size: 4.5pt; color: #999;
      margin-left: 1mm;
    }
    .star {
      color: #E4B200; font-size: 7.5pt;
      margin-right: 0.3mm; font-weight: 700;
    }
    .dots {
      flex: 1;
      border-bottom: 1px dotted #ccc;
      margin: 0 1.2mm; min-width: 2mm;
    }
    .price {
      font-size: 8.5pt; font-weight: 600;
      white-space: nowrap; flex-shrink: 0;
    }
    .desc {
      font-size: 4.5pt; color: #888;
      padding-left: 1.5mm;
      line-height: 1.15;
      margin-bottom: 0.1mm;
    }

    /* ===== BOTTOM SECTIONS ===== */
    .full-span { grid-column: 1 / -1; }

    .origin {
      margin-top: 1.2mm; padding-top: 1mm;
      border-top: 1px solid #ddd;
    }
    .origin-title {
      font-size: 5.5pt; font-weight: 700;
      color: #A61C1C; margin-bottom: 0.3mm;
    }
    .origin-text {
      font-size: 4.5pt; color: #999; line-height: 1.4;
    }

    .review {
      text-align: center;
      margin-top: 1mm;
      padding: 1.5mm 0;
      border-top: 2.5px solid #A61C1C;
    }
    .review-title {
      font-size: 9pt; font-weight: 800;
      color: #A61C1C; margin-bottom: 0.3mm;
    }
    .review-body { font-size: 7.5pt; }
    .review-stars { color: #E4B200; }
    .review-en {
      font-size: 5.5pt; color: #aaa; margin-top: 0.3mm;
    }
    .review-limit {
      font-size: 5pt; color: #ccc; margin-top: 0.3mm;
    }

    .qr-bar {
      display: flex; justify-content: center;
      gap: 10mm;
      padding-top: 1.5mm; margin-top: 1mm;
      border-top: 1px solid #eee;
    }
    .qr-block { text-align: center; }
    .qr-img { width: 14mm; height: 14mm; }
    .qr-label {
      font-size: 6pt; font-weight: 700;
      color: #A61C1C; margin-bottom: 0.3mm;
    }
    .qr-desc {
      font-size: 4.5pt; color: #999; margin-top: 0.3mm;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
  (function(){
    'use strict';

    var CAT_NOTES = {
      'sashimi-set': '\u25B8 \uC2A4\uB044\uB2E4\uC2DC 12\uC885 \uC81C\uACF5 \u2014 12 side dishes'
    };
    var BEST_IDS = ['set-b','sushi-assorted','fried-tori-karaage','roll-dragon'];
    var ORIGINS = [
      '\uAD11\uC5B4\u2014\uAD6D\uB0B4\uC0B0','\uC6B0\uB7ED\u2014\uAD6D\uB0B4\uC0B0',
      '\uC5F0\uC5B4\u2014\uB178\uB974\uC6E8\uC774\uC0B0','\uCC38\uCE58\u2014\uC6D0\uC591\uC0B0',
      '\uC6B0\uC0BC\uACA8\u2014\uBBF8\uAD6D\uC0B0','\uB2ED\uACE0\uAE30\u2014\uBE0C\uB77C\uC9C8\uC0B0',
      '\uBC14\uB2E4\uC7A5\uC5B4\u2014\uD398\uB8E8\uC0B0','\uCABD\uAFB8\uBBF8\u2014\uBCA0\uD2B8\uB0A8\uC0B0',
      '\uC54C\uD0D5 \uC7AC\uB8CC\u2014\uB7EC\uC2DC\uC544\uC0B0'
    ];

    fetch('data/menu.json').then(function(r){ return r.json(); }).then(render);

    function render(data){
      var cm = {}, bc = {}, im = {};
      data.categories.forEach(function(c){ cm[c.id] = c; });
      data.items.forEach(function(i){
        im[i.id] = i;
        if (!i.active) return;
        if (!bc[i.category]) bc[i.category] = [];
        bc[i.category].push(i);
      });
      Object.keys(bc).forEach(function(k){
        bc[k].sort(function(a,b){ return a.sort - b.sort; });
      });

      var h = '';

      /* ========== PAGE 1 ========== */
      h += '<div class="page">';

      // Header
      h += '<div class="header">';
      h += '<div class="header-brand">YATAI</div>';
      h += '<div class="header-sub">JAPANESE RESTAURANT</div>';
      h += '<div class="header-hours">OPEN 11:00 \u2013 23:00 \u00B7 LAST ORDER 22:00</div>';
      h += '</div>';

      // BEST text bar
      var bp = [];
      BEST_IDS.forEach(function(id){
        var it = im[id];
        if (it) bp.push('<span class="best-item">\u2605 ' + esc(it.name.ko) + '</span>');
      });
      h += '<div class="best-bar">';
      h += '<span class="best-label">\u2605 BEST MENU</span>';
      h += bp.join('<span class="best-sep">\u00B7</span>');
      h += '</div>';

      // Photo placeholder row (5 slots reserved)
      h += '<div class="best-photos">';
      var photoMap = {0:'set-b',1:'sushi-assorted',2:'roll-dragon',3:'fried-tori-karaage',4:null};
      for (var pi = 0; pi < 5; pi++){
        var pid = photoMap[pi];
        var pit = pid ? im[pid] : null;
        h += '<div style="text-align:center">';
        h += '<div class="best-photo-slot">';
        if (pit && pit.image && pit.image !== 'images/placeholder.webp') {
          h += '<img src="' + pit.image + '">';
        } else {
          h += '<span class="best-photo-label">PHOTO</span>';
        }
        h += '</div>';
        if (pit) {
          h += '<div class="best-photo-name">' + esc(pit.name.ko) + '</div>';
          h += '<div class="best-photo-price">\u20A9' + pit.price.toLocaleString('ko-KR') + '</div>';
        }
        h += '</div>';
      }
      h += '</div>';

      // 3-column menu grid
      h += '<div class="cols-3">';

      // Col 1: Set + Sashimi (combined raw fish)
      h += '<div>';
      h += catHTML(cm['set'], bc['set']);
      h += catHTML(cm['sashimi'], bc['sashimi']);
      h += catHTML(cm['sashimi-set'], bc['sashimi-set'], CAT_NOTES['sashimi-set']);
      h += '</div>';

      // Col 2: Sushi + Sushi Single
      h += '<div>';
      h += catHTML(cm['sushi'], bc['sushi']);
      h += catHTML(cm['sushi-single'], bc['sushi-single']);
      h += '</div>';

      // Col 3: Roll + Signature
      h += '<div>';
      h += catHTML(cm['roll'], bc['roll']);
      h += catHTML(cm['signature'], bc['signature']);
      h += '</div>';

      h += '</div>'; // cols-3
      h += '</div>'; // page

      /* ========== PAGE 2 ========== */
      h += '<div class="page">';

      h += '<div class="page2-header">';
      h += '<div class="page2-brand">YATAI</div>';
      h += '<div class="page2-sub">JAPANESE RESTAURANT \u00B7 MENU</div>';
      h += '</div>';

      h += '<div class="cols-3">';

      // Col 1: Grill + Fried + Rice Meals
      h += '<div>';
      h += catHTML(cm['grill'], bc['grill']);
      h += catHTML(cm['fried'], bc['fried']);
      h += catHTML(cm['meal'], bc['meal']);
      h += '</div>';

      // Col 2: Noodles + Hot Pot
      h += '<div>';
      h += catHTML(cm['noodle'], bc['noodle']);
      h += catHTML(cm['hotpot'], bc['hotpot']);
      h += '</div>';

      // Col 3: Drinks + Sake + Extras
      h += '<div>';
      h += catHTML(cm['drink'], bc['drink']);
      h += catHTML(cm['sake'], bc['sake']);
      h += catHTML(cm['extras'], bc['extras']);
      h += '</div>';

      // Origin
      h += '<div class="full-span origin">';
      h += '<div class="origin-title">\uC6D0\uC0B0\uC9C0 \uD45C\uC2DC</div>';
      h += '<div class="origin-text">' + ORIGINS.join(' | ') + '</div>';
      h += '</div>';

      // Review event
      h += '<div class="full-span review">';
      h += '<div class="review-title">\uB9AC\uBDF0 \uC774\uBCA4\uD2B8</div>';
      h += '<div class="review-body">\uB124\uC774\uBC84 \uB9AC\uBDF0 <span class="review-stars">\u2605\u2605\u2605\u2605\u2605</span> \uC791\uC131 \uC2DC \uC74C\uB8CC 1\uBCD1 \uBB34\uB8CC</div>';
      h += '<div class="review-limit">\u203B \uD14C\uC774\uBE14\uB2F9 1\uD68C | Limit: 1 per table</div>';
      h += '</div>';

      // 3 QR codes
      h += '<div class="full-span qr-bar">';
      h += '<div class="qr-block"><div class="qr-label">\u2B50 Review</div><img class="qr-img" src="qr/review.png"><div class="qr-desc">\uB124\uC774\uBC84 \uB9AC\uBDF0</div></div>';
      h += '<div class="qr-block"><div class="qr-label">\uD83D\uDCF7 Menu Photos</div><img class="qr-img" src="qr/gallery.png"><div class="qr-desc">Scan to view photos</div></div>';
      h += '<div class="qr-block"><div class="qr-label">\uD83C\uDF10 Mobile Menu</div><img class="qr-img" src="qr/mobile-menu.png"><div class="qr-desc">Multi-language menu</div></div>';
      h += '</div>';

      h += '</div>'; // cols-3
      h += '</div>'; // page

      document.getElementById('app').innerHTML = h;
    }

    function catHTML(cat, items, note){
      if (!cat || !items || !items.length) return '';
      var h = '<div class="cat">';
      h += '<div class="cat-bar">';
      h += '<span class="cat-bar-ko">' + esc(cat.name.ko) + '</span>';
      h += '<span class="cat-bar-en">' + esc(cat.name.en) + '</span>';
      h += '</div>';
      if (note) h += '<div class="cat-note">' + note + '</div>';
      items.forEach(function(it){
        h += '<div class="row"><span class="name">';
        if (it.recommended) h += '<span class="star">\u2605</span>';
        h += esc(it.name.ko);
        if (it.name.en) h += '<span class="name-en">' + esc(it.name.en) + '</span>';
        h += '</span><span class="dots"></span>';
        h += '<span class="price">\u20A9' + it.price.toLocaleString('ko-KR') + '</span></div>';
        if (it.description && it.description.ko) {
          h += '<div class="desc">' + esc(it.description.ko) + '</div>';
        }
      });
      return h + '</div>';
    }

    function esc(s){
      if (!s) return '';
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  })();
  </script>
</body>
</html>
