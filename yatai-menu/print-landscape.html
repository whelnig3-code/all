<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>YATAI Menu - A3 Landscape 1P - Izakaya</title>
  <style>
    @page { size: 426mm 303mm; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 426mm; min-height: 303mm;
      font-family: 'Segoe UI', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
      background: #FAF7F2; color: #1a1a1a;
      padding: 7mm 10mm 5mm;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .header { text-align: center; padding: 2.5mm 0 2mm; margin-bottom: 1.5mm; border-bottom: 2.5px solid #C45C26; }
    .header-brand { font-size: 28pt; font-weight: 900; letter-spacing: 8px; color: #C45C26; }
    .header-sub { font-size: 7pt; color: #888; letter-spacing: 3px; margin-top: 0.5mm; }
    .header-hours { font-size: 6pt; color: #aaa; margin-top: 0.8mm; }

    .popular { text-align: center; padding: 1.2mm 0; margin-bottom: 1.5mm; background: #C45C26; color: #fff; border-radius: 1mm; }
    .popular-title { font-size: 6.5pt; font-weight: 700; margin-bottom: 0.3mm; }
    .popular-items { font-size: 6.5pt; opacity: 0.95; }
    .popular-items span { margin: 0 2mm; }

    .cols { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 3.5mm; }

    .cat { break-inside: avoid; margin-bottom: 1.5mm; }
    .cat-bar { background: #C45C26; color: #fff; padding: 0.6mm 2mm; margin-bottom: 0.8mm; border-radius: 0.8mm; display: flex; align-items: baseline; gap: 1mm; }
    .cat-bar-ko { font-size: 7pt; font-weight: 700; }
    .cat-bar-en { font-size: 4.5pt; opacity: 0.8; }
    .cat-note { font-size: 4pt; color: #C45C26; font-style: italic; padding: 0.1mm 0 0.3mm 1mm; }

    .row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.25mm 0.5mm; line-height: 1.2; }
    .name { font-size: 6.5pt; font-weight: 500; flex-shrink: 0; }
    .name-en { font-size: 3.8pt; color: #999; margin-left: 0.8mm; }
    .star { color: #D4A017; font-size: 6pt; margin-right: 0.3mm; }
    .dots { flex: 1; border-bottom: 1px dotted #ccc; margin: 0 1mm; min-width: 2mm; }
    .price { font-size: 6.5pt; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .desc { font-size: 3.5pt; color: #999; padding-left: 1mm; line-height: 1.15; }

    .full-span { grid-column: 1 / -1; }
    .origin { margin-top: 1mm; padding-top: 1mm; border-top: 1px solid #ddd; }
    .origin-title { font-size: 5.5pt; font-weight: 700; color: #C45C26; margin-bottom: 0.3mm; }
    .origin-text { font-size: 4pt; color: #999; line-height: 1.3; }

    .review { text-align: center; margin-top: 1mm; padding: 1mm 0; border-top: 2px solid #C45C26; }
    .review-title { font-size: 7pt; font-weight: 800; color: #C45C26; margin-bottom: 0.3mm; }
    .review-body { font-size: 6pt; }
    .review-en { font-size: 4.5pt; color: #aaa; }
    .review-limit { font-size: 4pt; color: #ccc; margin-top: 0.2mm; }

    .qr-bar { display: flex; justify-content: flex-end; gap: 8mm; padding-top: 1mm; margin-top: 0.5mm; }
    .qr-block { text-align: center; }
    .qr-img { width: 12mm; height: 12mm; }
    .qr-label { font-size: 5.5pt; font-weight: 700; color: #C45C26; margin-bottom: 0.3mm; }
    .qr-desc { font-size: 4pt; color: #999; margin-top: 0.3mm; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-brand">YATAI</div>
    <div class="header-sub">JAPANESE RESTAURANT</div>
    <div class="header-hours">OPEN 11:00 – 23:00 · LAST ORDER 22:00</div>
  </div>
  <div id="pop"></div>
  <div class="cols" id="menu"></div>
  <script>
  (function(){
    var CAT_NOTES={'sashimi-set':'▸ 스끼다시 12종 제공 — 12 side dishes'};
    var POPULAR=['sushi-assorted','fried-tori-karaage','roll-dragon'];
    var COL=[
      ['set','sashimi','sashimi-set','sushi'],
      ['sushi-single','roll','signature'],
      ['grill','fried','meal'],
      ['noodle','hotpot','drink','extras']
    ];
    var ORIGINS=['광어—국내산','우럭—국내산','연어—노르웨이산','참치—원양산','우삼겹—미국산','닭고기—브라질산','바다장어—페루산','쭈꾸미—베트남산','알탕 재료—러시아산'];

    fetch('data/menu.json').then(function(r){return r.json()}).then(render);

    function render(d){
      var cm={},bc={},im={};
      d.categories.forEach(function(c){cm[c.id]=c});
      d.items.forEach(function(i){im[i.id]=i;if(!i.active)return;if(!bc[i.category])bc[i.category]=[];bc[i.category].push(i)});
      Object.keys(bc).forEach(function(k){bc[k].sort(function(a,b){return a.sort-b.sort})});

      var pp=[];POPULAR.forEach(function(id){var it=im[id];if(it)pp.push('<span>★ '+esc(it.name.ko)+'</span>')});
      document.getElementById('pop').innerHTML='<div class="popular"><div class="popular-title">★ Popular Menu</div><div class="popular-items">'+pp.join('<span> · </span>')+'</div></div>';

      var h='';
      COL.forEach(function(cats){h+='<div>';cats.forEach(function(cid){h+=catHTML(cm[cid],bc[cid],CAT_NOTES[cid])});h+='</div>'});
      h+='<div class="full-span origin"><div class="origin-title">원산지 표시</div><div class="origin-text">'+ORIGINS.join(' | ')+'</div></div>';
      h+='<div class="full-span review"><div class="review-title">리뷰 이벤트</div><div class="review-body">네이버 리뷰 ★★★★★ 작성 시 음료 1병 무료</div><div class="review-en">Leave a ★★★★★ review — Get 1 free drink</div><div class="review-limit">※ 1 테이블당 1회 | Limit: 1 per table</div></div>';
      h+='<div class="full-span qr-bar"><div class="qr-block"><div class="qr-label">📷 Menu Photos</div><img class="qr-img" src="qr/gallery.png"><div class="qr-desc">Scan to view food photos</div></div><div class="qr-block"><div class="qr-label">🌐 Mobile Menu</div><img class="qr-img" src="qr/mobile-menu.png"><div class="qr-desc">Scan for multi-language menu</div></div></div>';
      document.getElementById('menu').innerHTML=h;
    }

    function catHTML(cat,items,note){
      if(!cat||!items||!items.length)return'';
      var h='<div class="cat"><div class="cat-bar"><span class="cat-bar-ko">'+esc(cat.name.ko)+'</span><span class="cat-bar-en">'+esc(cat.name.en)+'</span></div>';
      if(note)h+='<div class="cat-note">'+note+'</div>';
      items.forEach(function(it){
        h+='<div class="row"><span class="name">';
        if(it.recommended)h+='<span class="star">★</span>';
        h+=esc(it.name.ko);if(it.name.en)h+='<span class="name-en">'+esc(it.name.en)+'</span>';
        h+='</span><span class="dots"></span><span class="price">₩'+it.price.toLocaleString('ko-KR')+'</span></div>';
        if(it.description&&it.description.ko)h+='<div class="desc">'+esc(it.description.ko)+'</div>';
      });
      return h+'</div>';
    }
    function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
  })();
  </script>
</body>
</html>
