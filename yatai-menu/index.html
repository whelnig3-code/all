<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#A1161A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/icon-192.png">
  <title>YATAI - Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #111; --surface: #1e1e1e; --card: #272727; --card-hover: #303030;
      --text: #f0f0f0; --text-sub: #999; --text-muted: #666;
      --accent: #E6B800; --red: #A1161A; --red-light: #c42228;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh; -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    /* --- Header --- */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, var(--bg) 0%, rgba(17,17,17,0.97) 100%);
      border-bottom: 2px solid var(--red);
    }
    .header-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
    }
    .logo-area { display: flex; align-items: baseline; gap: 10px; }
    .logo {
      font-size: 32px; font-weight: 900; letter-spacing: 6px;
      color: var(--red); line-height: 1;
    }
    .logo-sub { font-size: 11px; color: var(--text-sub); letter-spacing: 3px; }
    .header-info { text-align: right; font-size: 12px; color: var(--text-sub); line-height: 1.6; }
    .header-info .closed { color: var(--red-light); font-weight: 600; }

    /* --- Language bar --- */
    .lang-bar {
      background: var(--surface); border-bottom: 1px solid #333;
      padding: 8px 24px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .lang-bar::-webkit-scrollbar { display: none; }
    .lang-switcher { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
    .lang-btn {
      background: #333; border: 1px solid #444; color: #ccc;
      padding: 6px 14px; border-radius: 8px; font-size: 13px;
      cursor: pointer; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .lang-btn:hover { background: #444; }
    .lang-btn-active {
      background: var(--red); color: #fff; border-color: var(--red); font-weight: 600;
    }
    .lang-flag { font-size: 11px; font-weight: 700; opacity: 0.7; }
    .lang-btn-active .lang-flag { opacity: 1; }
    .lang-label { font-size: 13px; }

    /* --- Category nav --- */
    .cat-bar {
      background: var(--bg); border-bottom: 1px solid #333;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      padding: 10px 24px;
    }
    .cat-bar::-webkit-scrollbar { display: none; }
    .cat-list { display: flex; gap: 8px; list-style: none; justify-content: center; flex-wrap: wrap; }
    .cat-tab {
      padding: 8px 20px; border-radius: 24px; font-size: 14px; font-weight: 500;
      color: var(--text-sub); background: var(--surface); border: 1px solid #444;
      cursor: pointer; white-space: nowrap; text-decoration: none; transition: all 0.2s;
    }
    .cat-tab.active {
      background: var(--red); color: #fff; border-color: var(--red); font-weight: 700;
    }

    /* --- Content --- */
    .content {
      max-width: 1400px; margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* --- Category section --- */
    .cat-section { padding-top: 20px; }
    .cat-title {
      font-size: 20px; font-weight: 900; color: var(--accent);
      padding: 12px 0 8px; border-bottom: 2px solid #333; margin-bottom: 16px;
      display: flex; align-items: baseline; gap: 8px;
    }
    .cat-title-sub { font-size: 12px; color: var(--text-sub); font-weight: 400; }
    .cat-desc { font-size: 13px; color: var(--text-sub); margin-bottom: 12px; padding: 6px 0; }

    /* --- Menu grid --- */
    .menu-grid {
      display: grid; gap: 16px;
      grid-template-columns: repeat(3, 1fr);
    }
    @media (max-width: 1024px) {
      .menu-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .menu-grid { grid-template-columns: 1fr; }
    }

    /* --- Menu card --- */
    .menu-card {
      background: var(--card); border-radius: 12px; overflow: hidden;
      transition: background 0.2s;
    }
    .menu-card:active { background: var(--card-hover); }
    .menu-card-img-wrap {
      position: relative; width: 100%; padding-top: 66.67%; /* 3:2 ratio */
      background: #333; overflow: hidden;
    }
    .menu-card-img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover;
    }
    .menu-card-placeholder {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
      color: var(--text-muted); font-size: 13px; letter-spacing: 2px;
    }
    .menu-card-badge {
      position: absolute; top: 8px; left: 8px;
      background: var(--accent); color: #111; font-size: 11px; font-weight: 700;
      padding: 3px 8px; border-radius: 4px; letter-spacing: 1px;
    }
    .menu-card-body { padding: 12px 14px; }
    .menu-card-name {
      font-size: 16px; font-weight: 700; margin-bottom: 2px;
      line-height: 1.3;
    }
    .menu-card-name-sub {
      font-size: 12px; color: var(--text-sub); font-weight: 400;
      margin-bottom: 4px;
    }
    .menu-card-desc {
      font-size: 12px; color: var(--text-sub); line-height: 1.4;
      margin-bottom: 6px;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .menu-card-bottom {
      display: flex; align-items: center; gap: 8px;
    }
    .menu-card-price {
      font-size: 18px; font-weight: 900; color: var(--accent);
    }
    .menu-card-time {
      font-size: 10px; background: var(--red); color: #fff;
      padding: 2px 8px; border-radius: 4px; font-weight: 600;
    }

    /* --- Lunch banner --- */
    .lunch-banner {
      max-width: 1400px; margin: 16px auto 0; padding: 0 24px;
    }
    .lunch-banner-inner {
      background: var(--red); border-radius: 12px;
      padding: 14px 24px; display: flex; align-items: center;
      justify-content: center; gap: 16px; flex-wrap: wrap;
    }
    .lunch-banner-time { font-size: 12px; opacity: 0.8; }
    .lunch-banner-title { font-size: 18px; font-weight: 900; }
    .lunch-banner-desc { font-size: 13px; opacity: 0.9; }
    .lunch-banner-price { font-size: 22px; font-weight: 900; color: var(--accent); }

    /* --- Footer --- */
    .footer {
      max-width: 1400px; margin: 24px auto 0; padding: 16px 24px 32px;
      border-top: 1px solid #333; font-size: 11px; color: var(--text-sub);
      line-height: 1.6;
    }
    .footer-origin { margin-bottom: 8px; }
    .footer-review {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surface); padding: 6px 12px; border-radius: 8px;
      font-size: 12px;
    }
    .footer-review-star { color: var(--accent); }

    .loading-msg { text-align: center; padding: 80px 20px; color: var(--text-sub); font-size: 16px; }

    /* --- Popup overlay --- */
    .popup-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      justify-content: center; align-items: center;
      padding: 20px;
    }
    .popup-box {
      background: var(--card); border-radius: 16px; max-width: 480px; width: 100%;
      max-height: 90vh; overflow-y: auto; position: relative;
    }
    .popup-close {
      position: absolute; top: 10px; right: 14px; z-index: 10;
      background: rgba(0,0,0,0.6); border: none; color: #fff;
      font-size: 24px; width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .popup-img-wrap {
      position: relative; width: 100%; padding-top: 66%; overflow: hidden;
      border-radius: 16px 16px 0 0;
    }
    .popup-img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
    }
    .popup-img-ph {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
      color: var(--text-muted); font-size: 16px; letter-spacing: 3px;
    }
    .popup-badge {
      position: absolute; top: 12px; left: 12px;
      background: var(--accent); color: #111; font-size: 12px; font-weight: 700;
      padding: 4px 10px; border-radius: 4px;
    }
    .popup-body { padding: 16px 20px 20px; }
    .popup-name { font-size: 20px; font-weight: 800; margin-bottom: 2px; }
    .popup-name-ko { font-size: 14px; color: var(--text-sub); margin-bottom: 6px; }
    .popup-price { font-size: 22px; font-weight: 900; color: var(--accent); margin: 8px 0; }
    .popup-desc {
      font-size: 14px; color: #ccc; line-height: 1.6; margin-bottom: 6px;
      background: rgba(255,255,255,0.05); padding: 10px 12px; border-radius: 8px;
    }
    .popup-desc-ko {
      font-size: 13px; color: var(--text-sub); line-height: 1.5;
      padding: 0 12px 8px; font-style: italic;
    }
    .popup-time {
      display: inline-block; background: var(--red); color: #fff;
      font-size: 12px; padding: 4px 10px; border-radius: 4px; margin: 6px 0;
    }
    .popup-actions {
      display: flex; align-items: center; gap: 12px; margin-top: 16px;
    }
    .popup-qty {
      display: flex; align-items: center; gap: 0;
      background: var(--surface); border-radius: 8px; overflow: hidden;
    }
    .popup-qty-btn {
      background: none; border: none; color: var(--text); font-size: 20px;
      width: 40px; height: 40px; cursor: pointer; transition: background 0.2s;
    }
    .popup-qty-btn:active { background: rgba(255,255,255,0.1); }
    .popup-qty-val {
      font-size: 16px; font-weight: 700; min-width: 30px; text-align: center;
    }
    .popup-add-btn {
      flex: 1; background: var(--red); color: #fff; border: none;
      font-size: 16px; font-weight: 700; padding: 12px 20px;
      border-radius: 8px; cursor: pointer; transition: background 0.2s;
    }
    .popup-add-btn:active { background: var(--red-light); }

    /* --- Cart popup --- */
    .cart-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 8px; }
    .cart-title { font-size: 18px; font-weight: 800; }
    .cart-clear {
      background: none; border: 1px solid #555; color: #aaa; font-size: 12px;
      padding: 4px 10px; border-radius: 6px; cursor: pointer;
    }
    .cart-staff-note {
      font-size: 11px; color: var(--accent); padding: 0 20px 8px;
      letter-spacing: 1px; font-weight: 600;
    }
    .cart-empty { text-align: center; padding: 40px 20px; color: var(--text-sub); }
    .cart-list { padding: 0 20px; }
    .cart-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #333;
    }
    .cart-row-name { font-size: 15px; font-weight: 600; flex: 1; min-width: 0; }
    .cart-row-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .cart-row-qbtn {
      background: var(--surface); border: 1px solid #444; color: var(--text);
      width: 28px; height: 28px; border-radius: 6px; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .cart-row-qty { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }
    .cart-row-price { font-size: 14px; font-weight: 700; color: var(--accent); min-width: 65px; text-align: right; }
    .cart-row-del {
      background: none; border: none; color: #666; font-size: 18px;
      cursor: pointer; padding: 0 4px;
    }
    .cart-total {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px; border-top: 2px solid var(--accent); margin-top: 8px;
      font-size: 18px; font-weight: 800;
    }
    .cart-total-price { color: var(--accent); }

    /* --- FAB --- */
    .cart-fab {
      position: fixed; bottom: 24px; right: 24px; z-index: 500;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--red); border: none; color: #fff;
      font-size: 24px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s;
    }
    .cart-fab:active { transform: scale(0.92); }
    .cart-fab-badge {
      position: absolute; top: -4px; right: -4px;
      background: var(--accent); color: #111; font-size: 12px; font-weight: 800;
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* --- Toast --- */
    .cart-toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--accent); color: #111; font-size: 14px; font-weight: 700;
      padding: 10px 20px; border-radius: 8px;
      opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none;
      z-index: 600;
    }
    .cart-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .menu-card { cursor: pointer; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo-area">
        <span class="logo">YATAI</span>
        <span class="logo-sub">JAPANESE RESTAURANT</span>
      </div>
      <div class="header-info">
        <div>11:00 ~ 23:00 (Last Order 22:00)</div>
        <div class="closed" id="closedDay"></div>
      </div>
    </div>
    <div class="lang-bar" id="langBar"></div>
    <nav class="cat-bar" id="catBar">
      <ul class="cat-list" id="catList"></ul>
    </nav>
  </header>

  <main class="content" id="menuContent">
    <div class="loading-msg">Loading menu...</div>
  </main>

  <div class="lunch-banner" id="lunchBanner" style="display:none;">
    <div class="lunch-banner-inner">
      <span class="lunch-banner-time">11:00 ~ 15:00</span>
      <span class="lunch-banner-title" id="lunchTitle"></span>
      <span class="lunch-banner-desc" id="lunchDesc"></span>
      <span class="lunch-banner-price" id="lunchPrice"></span>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-origin" id="footerOrigin"></div>
    <div class="footer-review" id="footerReview"></div>
  </footer>

  <!-- Item detail popup -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-box" id="popupContent"></div>
  </div>

  <!-- Cart popup -->
  <div class="popup-overlay" id="cartOverlay">
    <div class="popup-box" id="cartContent"></div>
  </div>

  <!-- FAB -->
  <button class="cart-fab" onclick="Cart.showCart()">
    <span style="font-size:24px;">&#128722;</span>
    <span class="cart-fab-badge" id="cartFabBadge" style="display:none;">0</span>
  </button>

  <!-- Toast -->
  <div class="cart-toast" id="cartToast"></div>

  <script src="i18n.js"></script>
  <script src="cart.js"></script>
  <script>
    (function () {
      'use strict';

      var PLACEHOLDER = 'images/placeholder.webp';
      var menuContent = document.getElementById('menuContent');
      var catList = document.getElementById('catList');

      // i18n labels for closed day
      var closedLabels = {
        ko: '정기휴무: 매주 화요일',
        en: 'Closed: Every Tuesday',
        zh: '定休日：每周二',
        ja: '定休日：毎週火曜日',
        vi: 'Nghi: Thu Ba hang tuan',
        th: 'ปิด: ทุกวันอังคาร',
        ne: 'बन्द: प्रत्येक मंगलबार',
        ru: 'Выходной: каждый вторник'
      };

      var originLabels = {
        ko: '원산지: 광어-국내산 | 우럭-국내산 | 연어-노르웨이산 | 참치-원양산 | 우삼겹-미국산 | 닭고기-브라질산 | 바다장어-페루산 | 쭈꾸미-베트남산 | 알탕재료-러시아산',
        en: 'Origin: Flatfish-Korea | Rockfish-Korea | Salmon-Norway | Tuna-Ocean | Beef Brisket-USA | Chicken-Brazil | Sea Eel-Peru | Octopus-Vietnam | Fish Roe-Russia'
      };

      var reviewLabels = {
        ko: '리뷰 이벤트: 네이버 리뷰 작성 시 음료 1병 무료 (1테이블당 1회)',
        en: 'Review Event: Write a Naver review for 1 free drink (1 per table)'
      };

      var lunchLabels = {
        title: { ko: '점심특선 LUNCH SPECIAL', en: 'LUNCH SPECIAL' },
        desc: { ko: '돈까스백반 (돈까스+비빔국수+된장찌개+샐러드+밥+반찬)', en: 'Tonkatsu Set (Tonkatsu+Noodles+Soup+Salad+Rice+Side)' }
      };

      i18n.init();
      i18n.renderSwitcher(document.getElementById('langBar'));

      document.addEventListener('langchange', function () { renderAll(); });

      fetch('data/menu.json')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          window._menuData = data;
          renderAll(data);
        })
        .catch(function () {
          menuContent.innerHTML = '<div class="loading-msg" style="color:#e74c3c;">Failed to load menu</div>';
        });

      function renderAll(data) {
        data = data || window._menuData;
        if (!data) return;
        renderCatNav(data);
        renderMenu(data);
        renderFooter();
        renderLunch();
        updateActiveNav();
      }

      // --- Category nav ---
      function renderCatNav(data) {
        var cats = data.categories.slice().sort(function (a, b) { return a.sort - b.sort; });
        var html = '';
        cats.forEach(function (cat) {
          var hasItems = data.items.some(function (i) { return i.category === cat.id && i.active; });
          if (!hasItems) return;
          html += '<li><a class="cat-tab" href="#cat-' + cat.id + '" data-cat="' + cat.id + '">' +
            esc(i18n.getText(cat.name)) + '</a></li>';
        });
        catList.innerHTML = html;
      }

      // --- Render menu ---
      function renderMenu(data) {
        var cats = data.categories.slice().sort(function (a, b) { return a.sort - b.sort; });
        var html = '';
        var lang = i18n.getLang();

        cats.forEach(function (cat) {
          var items = data.items
            .filter(function (i) { return i.category === cat.id && i.active; })
            .sort(function (a, b) { return a.sort - b.sort; });
          if (items.length === 0) return;

          html += '<section class="cat-section" id="cat-' + cat.id + '">';
          html += '<h2 class="cat-title">' + esc(i18n.getText(cat.name));
          if (lang !== 'ko' && cat.name.ko) {
            html += ' <span class="cat-title-sub">' + esc(cat.name.ko) + '</span>';
          }
          if (lang === 'ko' && cat.name.en) {
            html += ' <span class="cat-title-sub">' + esc(cat.name.en) + '</span>';
          }
          html += '</h2>';
          if (cat.description) {
            var catDesc = i18n.getText(cat.description);
            if (catDesc) {
              html += '<div class="cat-desc">' + esc(catDesc) + '</div>';
            }
          }
          html += '<div class="menu-grid">';

          items.forEach(function (item) {
            html += renderCard(item, lang);
          });

          html += '</div></section>';
        });

        menuContent.innerHTML = html;
        document.getElementById('closedDay').textContent = closedLabels[lang] || closedLabels.ko;
        scrollToHash();
      }

      function renderCard(item, lang) {
        var imgSrc = item.image || PLACEHOLDER;
        var isPlaceholder = imgSrc === PLACEHOLDER;
        var name = i18n.getText(item.name);
        var koName = item.name.ko || '';
        var desc = i18n.getText(item.description);

        var h = '<div class="menu-card" data-item-id="' + escAttr(item.id) + '">';

        // Image area
        h += '<div class="menu-card-img-wrap">';
        if (isPlaceholder) {
          h += '<div class="menu-card-placeholder">PHOTO</div>';
        } else {
          h += '<img class="menu-card-img" loading="lazy" src="' + escAttr(imgSrc) + '" alt="' + escAttr(name) + '">';
        }
        if (item.recommended) {
          h += '<span class="menu-card-badge">BEST</span>';
        }
        h += '</div>';

        // Body
        h += '<div class="menu-card-body">';
        h += '<div class="menu-card-name">' + esc(name) + '</div>';
        if (lang !== 'ko' && koName && koName !== name) {
          h += '<div class="menu-card-name-sub">' + esc(koName) + '</div>';
        }
        if (desc) {
          h += '<div class="menu-card-desc">' + esc(desc) + '</div>';
        }
        h += '<div class="menu-card-bottom">';
        if (item.price > 0) {
          h += '<span class="menu-card-price">' + i18n.formatPrice(item.price) + '</span>';
        } else {
          h += '<span class="menu-card-price" style="color:var(--text-sub);font-size:13px;">' + i18n.t('priceTbd') + '</span>';
        }
        if (item.available_time) {
          h += '<span class="menu-card-time">' + i18n.t('lunchOnly') + ' ' + item.available_time.start + '~' + item.available_time.end + '</span>';
        }
        h += '</div></div></div>';
        return h;
      }

      function renderFooter() {
        var lang = i18n.getLang();
        document.getElementById('footerOrigin').textContent = originLabels[lang] || originLabels.ko;
        var review = reviewLabels[lang] || reviewLabels.ko;
        document.getElementById('footerReview').innerHTML =
          '<span class="footer-review-star">&#9733;&#9733;&#9733;&#9733;&#9733;</span> ' + esc(review);
      }

      function renderLunch() {
        var lang = i18n.getLang();
        var banner = document.getElementById('lunchBanner');
        banner.style.display = '';
        document.getElementById('lunchTitle').textContent = (lunchLabels.title[lang] || lunchLabels.title.ko);
        document.getElementById('lunchDesc').textContent = (lunchLabels.desc[lang] || lunchLabels.desc.ko);
        document.getElementById('lunchPrice').textContent = i18n.formatPrice(10000);
      }

      // --- Scroll / Nav ---
      function scrollToHash() {
        var hash = window.location.hash;
        if (!hash) return;
        var el = document.getElementById(hash.replace('#', ''));
        if (el) setTimeout(function () { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
      }
      window.addEventListener('hashchange', scrollToHash);

      var scrollTimer = null;
      window.addEventListener('scroll', function () {
        if (scrollTimer) return;
        scrollTimer = setTimeout(function () { scrollTimer = null; updateActiveNav(); }, 80);
      });

      function updateActiveNav() {
        var sections = document.querySelectorAll('.cat-section');
        var tabs = catList.querySelectorAll('.cat-tab');
        if (sections.length === 0) return;
        var scrollTop = window.scrollY + 180;
        var activeId = sections[0].id;
        for (var i = 0; i < sections.length; i++) {
          if (sections[i].offsetTop <= scrollTop) activeId = sections[i].id;
        }
        for (var j = 0; j < tabs.length; j++) {
          var cat = tabs[j].getAttribute('data-cat');
          if ('cat-' + cat === activeId) {
            tabs[j].classList.add('active');
            tabs[j].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          } else {
            tabs[j].classList.remove('active');
          }
        }
      }

      catList.addEventListener('click', function (e) {
        var link = e.target.closest('.cat-tab');
        if (!link) return;
        e.preventDefault();
        var cat = link.getAttribute('data-cat');
        var el = document.getElementById('cat-' + cat);
        if (el) {
          window.history.replaceState(null, '', '#cat-' + cat);
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });

      // --- Helpers ---
      function esc(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }
      function escAttr(s) {
        if (!s) return '';
        return s.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      // --- Card click -> item popup ---
      menuContent.addEventListener('click', function (e) {
        var card = e.target.closest('.menu-card');
        if (!card) return;
        var id = card.getAttribute('data-item-id');
        var data = window._menuData;
        if (!data) return;
        var item = data.items.find(function (i) { return i.id === id; });
        if (item) Cart.showItemPopup(item);
      });

      // Init cart
      Cart.init();

      // --- PWA ---
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    })();
  </script>
</body>
</html>
